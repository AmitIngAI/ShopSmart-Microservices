server:
  port: 8081  # Ye service port 8081 par chalegi

spring:
  application:
    name: user-service

  # Database ki settings (MySQL se connect karne ke liye)
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: root@2001  # <--- YAHAN APNA PASSWORD LIKHO
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Hibernate settings (Ye automatic table bana dega)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Eureka Server se connect karne ke liye
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/